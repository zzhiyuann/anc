<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E57200;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E57200;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E57200"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.6)"/>
    </marker>
    <marker id="arrowWhiteSolid" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" rx="12" fill="#232D4B"/>

  <!-- ==================== LEFT BOX: Diary Embedding and Retrieval ==================== -->
  <rect x="30" y="30" width="520" height="370" rx="10" fill="#2D3A5C" stroke="#3D4E7A" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Section title -->
  <text x="290" y="425" text-anchor="middle" fill="#E57200" font-size="16" font-weight="700" letter-spacing="0.5">Diary Embedding and Retrieval</text>

  <!-- Individual User icon + label -->
  <g transform="translate(60, 70)">
    <!-- Person icon -->
    <circle cx="22" cy="14" r="12" fill="none" stroke="#fff" stroke-width="1.8"/>
    <path d="M4,48 Q4,32 22,30 Q40,32 40,48" fill="none" stroke="#fff" stroke-width="1.8"/>
    <text x="22" y="68" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">Individual</text>
    <text x="22" y="82" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">User</text>
  </g>

  <!-- Diary bubble -->
  <g transform="translate(120, 60)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#3D4E7A" stroke="#5A6E9A" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10" font-style="italic">diary entry</text>
    <text x="70" y="36" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">"No reply from friend"</text>
    <!-- Bubble tail -->
    <polygon points="20,50 30,50 15,62" fill="#3D4E7A"/>
  </g>

  <!-- Embedding box -->
  <g transform="translate(300, 65)">
    <rect x="0" y="0" width="100" height="40" rx="6" fill="#E57200" fill-opacity="0.15" stroke="#E57200" stroke-width="1.2"/>
    <text x="50" y="25" text-anchor="middle" fill="#E57200" font-size="13" font-weight="600">Embedding</text>
  </g>

  <!-- Arrow: diary → embedding -->
  <line x1="262" y1="85" x2="298" y2="85" stroke="#E57200" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Arrow: embedding → down to vectors -->
  <line x1="350" y1="107" x2="350" y2="150" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" marker-end="url(#arrowWhite)"/>

  <!-- Peers section -->
  <g transform="translate(55, 180)">
    <!-- Multiple person icons -->
    <circle cx="16" cy="10" r="8" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.4"/>
    <circle cx="30" cy="10" r="8" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.4"/>
    <circle cx="44" cy="10" r="8" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.4"/>
    <rect x="2" y="24" width="56" height="16" rx="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="30" y="55" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="500">Peers</text>
  </g>

  <!-- Diary Vectors -->
  <g transform="translate(160, 170)">
    <!-- Scatter plot representing vectors -->
    <line x1="0" y1="40" x2="60" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="0" y1="40" x2="0" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <circle cx="15" cy="12" r="3.5" fill="#E57200"/>
    <circle cx="35" cy="25" r="3.5" fill="#6B9FD4"/>
    <circle cx="45" cy="8" r="3.5" fill="#E57200" opacity="0.6"/>
    <circle cx="20" cy="32" r="3.5" fill="#6B9FD4" opacity="0.6"/>
    <circle cx="50" cy="30" r="3.5" fill="#91C46C"/>
    <text x="30" y="58" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="500">Diary Vectors</text>
  </g>

  <!-- Database -->
  <g transform="translate(280, 170)">
    <ellipse cx="35" cy="8" rx="35" ry="10" fill="#3D4E7A" stroke="#5A6E9A" stroke-width="1.2"/>
    <rect x="0" y="8" width="70" height="30" fill="#3D4E7A" stroke="none"/>
    <line x1="0" y1="8" x2="0" y2="38" stroke="#5A6E9A" stroke-width="1.2"/>
    <line x1="70" y1="8" x2="70" y2="38" stroke="#5A6E9A" stroke-width="1.2"/>
    <ellipse cx="35" cy="38" rx="35" ry="10" fill="#3D4E7A" stroke="#5A6E9A" stroke-width="1.2"/>
    <text x="35" y="58" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="500">Database</text>
  </g>

  <!-- Arrows: peers → vectors → database -->
  <line x1="115" y1="200" x2="155" y2="200" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" marker-end="url(#arrowWhite)"/>
  <line x1="230" y1="200" x2="275" y2="200" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" marker-end="url(#arrowWhite)"/>

  <!-- Retrieve label + arrow -->
  <text x="430" y="145" fill="#E57200" font-size="15" font-weight="700" font-style="italic">Retrieve</text>
  <line x1="400" y1="150" x2="400" y2="200" stroke="#E57200" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="360" y1="200" x2="398" y2="170" stroke="#E57200" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ==================== MIDDLE: Retrieved Context ==================== -->
  <g transform="translate(460, 55)">
    <rect x="0" y="0" width="210" height="290" rx="8" fill="#2D3A5C" stroke="#3D4E7A" stroke-width="1.2"/>

    <!-- Personal Traits -->
    <g transform="translate(15, 20)">
      <circle cx="10" cy="10" r="9" fill="none" stroke="#6B9FD4" stroke-width="1.3"/>
      <circle cx="10" cy="7" r="3.5" fill="none" stroke="#6B9FD4" stroke-width="1"/>
      <path d="M3,17 Q3,13 10,12 Q17,13 17,17" fill="none" stroke="#6B9FD4" stroke-width="1"/>
      <text x="28" y="14" fill="#fff" font-size="12" font-weight="500">Personal Traits</text>
    </g>

    <!-- Last Diaries -->
    <g transform="translate(15, 65)">
      <rect x="2" y="2" width="14" height="16" rx="2" fill="none" stroke="#91C46C" stroke-width="1.2"/>
      <rect x="6" y="5" width="14" height="16" rx="2" fill="none" stroke="#91C46C" stroke-width="1.2"/>
      <text x="28" y="16" fill="#fff" font-size="12" font-weight="500">Last Diaries</text>
    </g>

    <!-- Current Diary -->
    <g transform="translate(15, 110)">
      <rect x="2" y="2" width="16" height="18" rx="2" fill="none" stroke="#E57200" stroke-width="1.3"/>
      <line x1="5" y1="8" x2="15" y2="8" stroke="#E57200" stroke-width="1" opacity="0.6"/>
      <line x1="5" y1="12" x2="13" y2="12" stroke="#E57200" stroke-width="1" opacity="0.6"/>
      <text x="28" y="16" fill="#fff" font-size="12" font-weight="500">Current Diary</text>
    </g>

    <!-- Divider -->
    <line x1="15" y1="148" x2="195" y2="148" stroke="#3D4E7A" stroke-width="1"/>

    <!-- Contextually similar diaries -->
    <g transform="translate(15, 162)">
      <circle cx="10" cy="14" r="9" fill="none" stroke="#E57200" stroke-width="1.3"/>
      <text x="10" y="18" text-anchor="middle" fill="#E57200" font-size="10" font-weight="700">~</text>
      <text x="28" y="10" fill="#fff" font-size="11" font-weight="500">Contextually similar</text>
      <text x="28" y="26" fill="#fff" font-size="11" font-weight="500">diaries with</text>
      <text x="28" y="42" fill="#E57200" font-size="11" font-weight="600">ground-truth labels</text>
    </g>

    <!-- Section sublabel -->
    <text x="105" y="275" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-style="italic">retrieved context</text>
  </g>

  <!-- Arrow: left box → context box -->
  <line x1="445" y1="140" x2="458" y2="140" stroke="#E57200" stroke-width="1.8" marker-end="url(#arrowOrange)"/>
  <line x1="445" y1="250" x2="458" y2="250" stroke="#E57200" stroke-width="1.8" marker-end="url(#arrowOrange)"/>

  <!-- ==================== RIGHT BOX: Context-Aware Generation ==================== -->
  <rect x="695" y="30" width="480" height="370" rx="10" fill="#2D3A5C" stroke="#3D4E7A" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Section title -->
  <text x="935" y="425" text-anchor="middle" fill="#E57200" font-size="16" font-weight="700" letter-spacing="0.5">Context-Aware Generation</text>

  <!-- Prompt box -->
  <g transform="translate(720, 120)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="#E57200" fill-opacity="0.12" stroke="#E57200" stroke-width="1.3"/>
    <!-- Terminal icon -->
    <text x="50" y="40" text-anchor="middle" fill="#E57200" font-size="28" font-weight="300">&gt;_</text>
    <text x="50" y="68" text-anchor="middle" fill="#E57200" font-size="13" font-weight="600">Prompt</text>
  </g>

  <!-- Arrow: context → prompt -->
  <line x1="672" y1="200" x2="716" y2="200" stroke="#E57200" stroke-width="1.8" marker-end="url(#arrowOrange)"/>

  <!-- LLM box -->
  <g transform="translate(860, 120)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.3"/>
    <!-- Brain/network icon -->
    <circle cx="50" cy="32" r="18" fill="none" stroke="#fff" stroke-width="1.2"/>
    <circle cx="42" cy="26" r="3" fill="#6B9FD4"/>
    <circle cx="58" cy="26" r="3" fill="#6B9FD4"/>
    <circle cx="50" cy="38" r="3" fill="#6B9FD4"/>
    <circle cx="40" cy="36" r="2.5" fill="#91C46C"/>
    <circle cx="60" cy="36" r="2.5" fill="#91C46C"/>
    <line x1="42" y1="26" x2="58" y2="26" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
    <line x1="42" y1="26" x2="50" y2="38" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
    <line x1="58" y1="26" x2="50" y2="38" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
    <text x="50" y="68" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">LLM</text>
  </g>

  <!-- Arrow: prompt → LLM -->
  <line x1="822" y1="160" x2="856" y2="160" stroke="#fff" stroke-width="1.5" marker-end="url(#arrowWhiteSolid)"/>

  <!-- Output predictions -->
  <g transform="translate(1000, 65)">
    <!-- Positive Affect -->
    <g transform="translate(0, 0)">
      <circle cx="12" cy="12" r="11" fill="none" stroke="#91C46C" stroke-width="1.3"/>
      <text x="12" y="16" text-anchor="middle" fill="#91C46C" font-size="12">:)</text>
      <text x="30" y="16" fill="#fff" font-size="12" font-weight="500">Positive Affect</text>
    </g>

    <!-- Negative Affect -->
    <g transform="translate(0, 40)">
      <circle cx="12" cy="12" r="11" fill="none" stroke="#E85D5D" stroke-width="1.3"/>
      <text x="12" y="16" text-anchor="middle" fill="#E85D5D" font-size="12">:(</text>
      <text x="30" y="16" fill="#fff" font-size="12" font-weight="500">Negative Affect</text>
    </g>

    <!-- Social Interaction -->
    <g transform="translate(0, 80)">
      <circle cx="12" cy="12" r="11" fill="none" stroke="#6B9FD4" stroke-width="1.3"/>
      <circle cx="8" cy="10" r="3" fill="none" stroke="#6B9FD4" stroke-width="0.8"/>
      <circle cx="16" cy="10" r="3" fill="none" stroke="#6B9FD4" stroke-width="0.8"/>
      <line x1="10" y1="12" x2="14" y2="12" stroke="#6B9FD4" stroke-width="0.8"/>
      <text x="30" y="16" fill="#fff" font-size="12" font-weight="500">Social Interaction</text>
    </g>

    <!-- Regulation Desire -->
    <g transform="translate(0, 120)">
      <circle cx="12" cy="12" r="11" fill="none" stroke="#B88FD6" stroke-width="1.3"/>
      <path d="M8,14 L12,8 L16,14" fill="none" stroke="#B88FD6" stroke-width="1.3"/>
      <text x="30" y="16" fill="#fff" font-size="12" font-weight="500">Regulation Desire</text>
    </g>

    <!-- Availability for Intervention -->
    <g transform="translate(0, 160)">
      <circle cx="12" cy="12" r="11" fill="none" stroke="#E5B744" stroke-width="1.3"/>
      <circle cx="12" cy="9" r="4" fill="none" stroke="#E5B744" stroke-width="1"/>
      <line x1="12" y1="13" x2="12" y2="18" stroke="#E5B744" stroke-width="1.2"/>
      <text x="30" y="10" fill="#fff" font-size="11" font-weight="500">Availability for</text>
      <text x="30" y="24" fill="#fff" font-size="11" font-weight="500">Intervention</text>
    </g>
  </g>

  <!-- Arrow: LLM → outputs -->
  <line x1="962" y1="160" x2="994" y2="160" stroke="#fff" stroke-width="1.5" marker-end="url(#arrowWhiteSolid)"/>

  <!-- Large flow arrow left→right (subtle background) -->
  <line x1="555" y1="370" x2="680" y2="370" stroke="#E57200" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowOrange)" opacity="0.4"/>

</svg>
