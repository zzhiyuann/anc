name: ANC
options:
  bundleIdPrefix: com.anc
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_NAME: ANC
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "ANC"
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 ANC"
    INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
targets:
  ANC:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/ANC
        excludes:
          - "Info.plist"
    info:
      path: Sources/ANC/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.productivity
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES
