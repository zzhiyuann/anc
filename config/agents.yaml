    role: personas/roles/strategist.md
    protocols:
      - personas/protocols/completion.md
      - personas/protocols/communication.md
      - personas/protocols/memory.md

  ops:
    name: "Ops"
    model: claude-code
    linearUserId: ""
    maxConcurrency: 2
    dutySlots: 1
    base: personas/base.md
    role: personas/roles/ops.md
    protocols:
      - personas/protocols/completion.md
      - personas/protocols/communication.md
      - personas/protocols/memory.md
