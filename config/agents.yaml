agents:
  engineer:
    name: "Engineer"
    model: claude-code
    linearUserId: ""  # fill after OAuth setup
    maxConcurrency: 3  # parallel task sessions
    dutySlots: 1       # separate pool for proactive duties
    base: personas/base.md
    role: personas/roles/engineer.md
    protocols:
      - personas/protocols/completion.md
      - personas/protocols/communication.md
      - personas/protocols/memory.md

  strategist:
    name: "Strategist"
    model: claude-code
