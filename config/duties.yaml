# Standing Duties — proactive behaviors triggered by time or events.
# Each role can have multiple duties. Adding new proactive behaviors = adding entries here.
#
# Triggers:
#   cron: "2h" / "30m" / "24h" — periodic
#   event: "agent:failed" / "agent:completed" — reactive to bus events
#
# Variables in prompt: {issueKey}, {role}, {error}, {timestamp}

duties:
  # --- Ops: Company Pulse ---
  - id: company-pulse
    role: ops
    trigger:
      cron: "2h"
    issuePrefix: "pulse"
    prompt: |
      [Company Pulse] Run a health check of the entire system.

      Scan these areas and report findings:

      1. **System Health**: Check `anc status` for tripped circuit breakers, queue depth, and agent states. Check tmux for orphaned sessions.
      2. **Issue Flow**: Use `anc list-issues "In Review"` — flag any stuck > 24h. Use `anc list-issues "In Progress"` — flag any with no recent activity.
      3. **Agent Performance**: Check shared memory for recent retrospectives. Note patterns of failure.

      Actions:
      - Small fixable problems → create sub-issues and dispatch to Engineer
      - CEO attention needed → use `anc group` to post summary to Discord
      - Critical (system down, data risk) → Telegram notification

      Write your findings to `.agent-memory/pulse-{timestamp}.md`.
      No HANDOFF needed — this is a standing duty.

  # --- Ops: Failure Post-Mortem ---
  - id: failure-postmortem
    role: ops
    trigger:
      event: "agent:failed"
    issuePrefix: "postmortem"
    prompt: |
      [Failure Post-Mortem] Agent {role} failed on {issueKey}.
      Error: {error}

      Investigate:
      1. Read the workspace at ~/anc-workspaces/{issueKey}/ for any output
      2. Check if this issue has failed before (pattern?)
      3. Classify: transient (rate limit, timeout) or systemic (code bug, config error)?

      Actions:
      - Transient → log to shared memory, no issue needed
      - Systemic → create a fix issue: `anc create-sub {issueKey} "Fix: <root cause>" "<details>"`
      - Pattern (3+ failures on same issue) → flag to CEO via Discord

      Write findings to shared memory: `~/.anc/shared-memory/postmortem-{issueKey}.md`
      No HANDOFF needed.

  # --- CEO Office: Health Monitor ---
  - id: health-monitor
    role: ceo-office
    trigger:
      cron: "30m"
    issuePrefix: "healthcheck"
    prompt: |
      [Health Monitor] Check system health and report to CEO.

      1. Run `anc team-status` to get current agent states, queue depth, and circuit breakers.
      2. Check for stuck agents: any active session > 30min with no output change.
      3. Check queue depth: if > 5 items queued for any role, flag it.
      4. Check circuit breakers: any tripped breakers are a concern.

      Actions:
      - All clear → write findings to `.agent-memory/health-{timestamp}.md`, no notification
      - Problems found → post brief summary to Discord via `anc group`
      - Critical (agent stuck 1h+, queue > 10, multiple breakers) → create sub-issue for the relevant agent

      Keep it brief. CEO doesn't want noise.
      No HANDOFF needed — this is a standing duty.

  # --- CEO Office: Agent Recovery Coordinator ---
  - id: agent-recovery
    role: ceo-office
    trigger:
      event: "agent:failed"
    issuePrefix: "recovery"
    prompt: |
      [Agent Recovery] Agent {role} failed on {issueKey}.
      Error: {error}

      This is a coordination check, NOT a technical investigation (Ops handles that).

      1. Check if this is a first-time failure → log it, no action needed (circuit breaker handles retry).
      2. Check shared memory for prior failures on this same issue.
      3. If 3+ failures on same issue: post alert to Discord via `anc group` recommending CEO intervention.

      Do NOT attempt to fix anything. Just track and escalate when needed.
      Write findings to `.agent-memory/recovery-{issueKey}-{timestamp}.md`.
      No HANDOFF needed — this is a standing duty.

  # --- CEO Office: Memory Consolidation ---
  - id: memory-consolidation
    role: ceo-office
    trigger:
      cron: "24h"
    issuePrefix: "memconsolidate"
    prompt: |
      [Memory Consolidation] Run the memory consolidation engine.

      Execute: `anc memory consolidate`

      This scans all agent memory files for:
      1. Near-duplicate files → merges them (superseded_by link)
      2. Contradicting numeric facts → flags with low confidence
      3. Stale files (no update in 30 days) → marks stale
      4. Importance decay (high → normal → low over time)

      Review the output. If contradictions are found, check if they need
      CEO resolution and post to Discord via `anc group` if so.

      No HANDOFF needed — this is a standing duty.

  # --- CEO Office: Optimization Cycle ---
  - id: optimization-cycle
    role: ceo-office
    trigger:
      cron: "24h"
    issuePrefix: "optimize"
    prompt: |
      [Optimization Cycle] Run the self-optimization engine.

      Execute: `anc optimize`

      This computes system metrics (quality, success rate, cost, completion time),
      checks running experiments for measurement, and proposes new experiments
      based on rule-based analysis.

      Review the output. If an experiment is proposed, verify the hypothesis
      makes sense. If an experiment was measured and rejected, check if the
      rollback was clean.

      No HANDOFF needed — this is a standing duty.

