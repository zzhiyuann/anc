name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Typecheck
        run: npx -p typescript tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
